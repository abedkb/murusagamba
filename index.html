<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Murusagamba Secondary School</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<!-- Supabase JS client -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg:       #07101a;
  --bg2:      #0d1b2a;
  --bg3:      #122033;
  --card:     #0f1e2d;
  --card2:    #162638;
  --border:   rgba(212,175,55,0.18);
  --gold:     #d4af37;
  --gold2:    #f0d060;
  --teal:     #2a9d8f;
  --teal2:    #38b2a3;
  --coral:    #e76f51;
  --blue:     #3a86ff;
  --purple:   #8b5cf6;
  --green:    #22c55e;
  --text:     #f0f4ff;
  --text2:    #a0b0c8;
  --text3:    #506070;
  --r:        14px;
  --rg:       24px;
  --shadow:   0 8px 40px rgba(0,0,0,0.5);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh;line-height:1.5}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:rgba(212,175,55,0.3);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--gold)}
.hidden{display:none!important}
.mono{font-family:'Space Mono',monospace}

/* ── LOADING OVERLAY ── */
#loadingOverlay{position:fixed;inset:0;background:rgba(7,16,26,0.92);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.spinner{width:40px;height:40px;border:3px solid rgba(212,175,55,0.2);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:var(--text2)}

/* ── LOGIN ── */
#loginPage{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse 80% 60% at 50% 0%, rgba(212,175,55,0.07), transparent),radial-gradient(ellipse 60% 50% at 80% 80%, rgba(42,157,143,0.06), transparent),var(--bg);}
.login-box{width:480px;max-width:95vw;background:var(--card);border:1px solid var(--border);border-radius:32px;padding:44px 40px;box-shadow:var(--shadow), 0 0 0 1px rgba(212,175,55,0.06);position:relative;overflow:hidden;}
.login-box::before{content:'';position:absolute;top:-60px;right:-60px;width:180px;height:180px;background:radial-gradient(circle, rgba(212,175,55,0.1), transparent 70%);border-radius:50%;pointer-events:none;}
.login-logo{width:72px;height:72px;margin:0 auto 20px;background:linear-gradient(135deg,var(--gold),#b8860b);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:32px;box-shadow:0 4px 20px rgba(212,175,55,0.3);}
.login-title{font-size:24px;font-weight:800;text-align:center;letter-spacing:-.5px}
.login-sub{font-size:12px;color:var(--text2);text-align:center;margin-top:4px;margin-bottom:28px}
.login-hint{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:12px 16px;font-size:11px;color:var(--text3);margin-top:16px;line-height:1.8;}
.login-hint strong{color:var(--text2)}

/* ── TOPBAR ── */
.topbar{position:sticky;top:0;z-index:100;height:64px;background:rgba(7,16,26,0.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;}
.brand{display:flex;align-items:center;gap:12px}
.brand-icon{width:38px;height:38px;background:linear-gradient(135deg,var(--gold),#b8860b);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
.brand-name{font-size:15px;font-weight:800;letter-spacing:-.3px}
.brand-sub{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.8px}
.topbar-right{display:flex;align-items:center;gap:12px}
.chip{display:inline-flex;align-items:center;gap:5px;padding:5px 14px;border-radius:60px;font-size:11px;font-weight:700;letter-spacing:.3px}
.chip-gold{background:rgba(212,175,55,0.15);color:var(--gold);border:1px solid rgba(212,175,55,0.25)}
.chip-teal{background:rgba(42,157,143,0.15);color:var(--teal);border:1px solid rgba(42,157,143,0.25)}
.chip-blue{background:rgba(58,134,255,0.15);color:var(--blue);border:1px solid rgba(58,134,255,0.25)}
.chip-coral{background:rgba(231,111,81,0.15);color:var(--coral);border:1px solid rgba(231,111,81,0.25)}
.chip-purple{background:rgba(139,92,246,0.15);color:var(--purple);border:1px solid rgba(139,92,246,0.25)}
.lang-btn{background:var(--bg3);border:1px solid var(--border);border-radius:60px;padding:6px 14px;cursor:pointer;font-size:12px;font-weight:600;color:var(--text2);transition:.18s;font-family:inherit;}
.lang-btn:hover{border-color:var(--gold);color:var(--gold)}

/* ── LAYOUT ── */
.app-body{display:flex;min-height:calc(100vh - 64px)}
.sidebar{width:240px;flex-shrink:0;padding:16px 10px;background:rgba(7,16,26,0.6);border-right:1px solid var(--border);display:flex;flex-direction:column;gap:2px;overflow-y:auto;}
.main{flex:1;padding:28px;overflow:auto}
.nav-sec{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;padding:10px 12px 4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);transition:.18s;border:none;background:transparent;width:100%;text-align:left;font-family:inherit;}
.nav-item:hover{background:rgba(212,175,55,0.08);color:var(--text)}
.nav-item.active{background:linear-gradient(90deg,rgba(212,175,55,0.2),rgba(212,175,55,0.04));color:var(--gold);border-left:3px solid var(--gold);font-weight:700;}
.nav-item .icon{font-size:15px;width:20px;text-align:center}
.nav-logout{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;color:var(--coral);border:none;background:transparent;width:100%;font-family:inherit;transition:.18s;margin-top:8px}
.nav-logout:hover{background:rgba(231,111,81,0.1)}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--rg);padding:22px;margin-bottom:20px;transition:.2s}
.card:hover{border-color:rgba(212,175,55,0.3)}
.card-title{font-size:15px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}

/* ── STATS ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:22px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--rg);padding:20px;position:relative;overflow:hidden;}
.stat-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px}
.stat-gold::after{background:linear-gradient(90deg,var(--gold),var(--gold2))}.stat-teal::after{background:var(--teal)}.stat-coral::after{background:var(--coral)}.stat-blue::after{background:var(--blue)}.stat-green::after{background:var(--green)}.stat-purple::after{background:var(--purple)}
.stat-val{font-size:28px;font-weight:800;font-family:'Space Mono',monospace;letter-spacing:-1px}
.stat-gold .stat-val{color:var(--gold)}.stat-teal .stat-val{color:var(--teal)}.stat-coral .stat-val{color:var(--coral)}.stat-blue .stat-val{color:var(--blue)}.stat-green .stat-val{color:var(--green)}.stat-purple .stat-val{color:var(--purple)}
.stat-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;margin-top:6px;font-weight:600}
.stat-icon{position:absolute;top:14px;right:14px;font-size:22px;opacity:.2}

/* ── FORMS ── */
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:14px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px}
input,select,textarea{width:100%;padding:10px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Sora',sans-serif;font-size:13px;outline:none;transition:.18s;}
input:focus,select:focus,textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,175,55,0.08)}
input::placeholder{color:var(--text3)}
select option{background:var(--bg2)}
textarea{resize:vertical;min-height:90px;border-radius:12px}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 20px;border:none;border-radius:60px;font-family:'Sora',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:.18s;letter-spacing:.2px;}
.btn:hover{transform:translateY(-1px);filter:brightness(1.1)}
.btn:active{transform:translateY(0)}
.btn-gold{background:var(--gold);color:#111}.btn-teal{background:var(--teal);color:#fff}.btn-coral{background:var(--coral);color:#fff}.btn-blue{background:var(--blue);color:#fff}.btn-purple{background:var(--purple);color:#fff}.btn-green{background:var(--green);color:#111}
.btn-ghost{background:var(--bg3);color:var(--text);border:1px solid var(--border)}.btn-ghost:hover{border-color:var(--gold);color:var(--gold)}
.btn-sm{padding:6px 14px;font-size:12px}.btn-xs{padding:4px 10px;font-size:11px}

/* ── TABLES ── */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--bg3);color:var(--text2);padding:10px 14px;text-align:left;font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid var(--border);}
td{padding:11px 14px;border-bottom:1px solid rgba(212,175,55,0.06);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(212,175,55,0.03)}

/* ── BADGES ── */
.badge{display:inline-block;padding:3px 10px;border-radius:60px;font-size:11px;font-weight:700}
.badge-A{background:rgba(34,197,94,.15);color:var(--green)}.badge-Bp{background:rgba(42,157,143,.15);color:var(--teal)}.badge-Bm{background:rgba(58,134,255,.15);color:var(--blue)}.badge-C{background:rgba(212,175,55,.15);color:var(--gold)}.badge-D{background:rgba(249,115,22,.15);color:#f97316}.badge-F{background:rgba(231,111,81,.15);color:var(--coral)}
.badge-paid{background:rgba(34,197,94,.15);color:var(--green)}.badge-partial{background:rgba(212,175,55,.15);color:var(--gold)}.badge-unpaid{background:rgba(231,111,81,.15);color:var(--coral)}
.badge-present{background:rgba(34,197,94,.15);color:var(--green)}.badge-absent{background:rgba(231,111,81,.15);color:var(--coral)}.badge-late{background:rgba(212,175,55,.15);color:var(--gold)}
.badge-info{background:rgba(58,134,255,.12);color:var(--blue);border:1px solid rgba(58,134,255,.2)}
.badge-admin{background:rgba(139,92,246,.15);color:var(--purple)}.badge-academic{background:rgba(42,157,143,.15);color:var(--teal)}.badge-bursar{background:rgba(212,175,55,.15);color:var(--gold)}.badge-student{background:rgba(58,134,255,.15);color:var(--blue)}

/* ── ALERTS ── */
.alert{padding:11px 18px;border-radius:60px;font-size:13px;margin-bottom:14px;font-weight:500;display:flex;align-items:center;gap:8px}
.alert-success{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);color:var(--green)}
.alert-danger{background:rgba(231,111,81,.1);border:1px solid rgba(231,111,81,.25);color:var(--coral)}
.alert-info{background:rgba(212,175,55,.08);border:1px solid rgba(212,175,55,.2);color:var(--gold)}

/* ── INFO BOXES ── */
.info-box{background:rgba(212,175,55,.06);border:1px solid rgba(212,175,55,.18);border-radius:12px;padding:11px 16px;font-size:12px;color:var(--text2);margin-bottom:14px;line-height:1.7}
.info-box strong{color:var(--gold)}
.warn-box{background:rgba(231,111,81,.07);border:1px solid rgba(231,111,81,.2);border-radius:12px;padding:11px 16px;font-size:12px;color:var(--coral);margin-bottom:14px}

/* ── PAGE HEADER ── */
.page-title{font-size:22px;font-weight:800;letter-spacing:-.5px;margin-bottom:4px}
.page-desc{font-size:13px;color:var(--text2);margin-bottom:24px}

/* ── TABS ── */
.tab-row{display:flex;gap:3px;background:var(--bg2);border:1px solid var(--border);border-radius:60px;padding:3px;margin-bottom:20px;width:fit-content;flex-wrap:wrap}
.tab-btn{padding:7px 18px;border-radius:60px;border:none;background:transparent;color:var(--text2);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:.18s}
.tab-btn.active{background:var(--gold);color:#111}

/* ── CLASS SECTIONS ── */
.class-section{background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px}
.class-section-title{font-size:13px;font-weight:800;color:var(--gold);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.class-pill{display:inline-flex;align-items:center;padding:3px 12px;border-radius:60px;font-size:11px;font-weight:700;background:rgba(212,175,55,.1);color:var(--gold);border:1px solid rgba(212,175,55,.2)}
.subj-pill{display:inline-flex;align-items:center;padding:3px 10px;border-radius:60px;font-size:11px;font-weight:700;background:rgba(42,157,143,.1);color:var(--teal);border:1px solid rgba(42,157,143,.2)}

/* ── ANNOUNCEMENTS ── */
.ann-card{background:var(--card2);border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:12px;position:relative;overflow:hidden;transition:.18s;}
.ann-card:hover{border-color:rgba(212,175,55,.35)}
.ann-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--gold)}
.ann-card.teachers::before{background:var(--teal)}.ann-card.parents::before{background:var(--blue)}.ann-card.all::before{background:var(--purple)}
.ann-title{font-size:14px;font-weight:700;margin-bottom:6px}
.ann-body{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:10px}
.ann-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.ann-meta span{font-size:11px;color:var(--text3)}
.ann-priority{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:60px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.priority-high{background:rgba(231,111,81,.15);color:var(--coral)}.priority-normal{background:rgba(42,157,143,.15);color:var(--teal)}.priority-low{background:rgba(212,175,55,.15);color:var(--gold)}
.recip-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:60px;font-size:10px;font-weight:700}
.recip-all{background:rgba(139,92,246,.15);color:var(--purple)}.recip-teachers{background:rgba(42,157,143,.15);color:var(--teal)}.recip-parents{background:rgba(58,134,255,.15);color:var(--blue)}.recip-class{background:rgba(212,175,55,.15);color:var(--gold)}

/* ── MESSAGES ── */
.msg-card{background:var(--card2);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px;transition:.18s;cursor:pointer;}
.msg-card:hover{border-color:rgba(212,175,55,.35);background:var(--bg3)}
.msg-card.unread{border-left:3px solid var(--gold)}
.msg-card.unread .msg-title{color:var(--gold)}
.msg-title{font-size:14px;font-weight:700;margin-bottom:4px}
.msg-preview{font-size:12px;color:var(--text2);line-height:1.5}
.msg-meta{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.unread-dot{width:8px;height:8px;background:var(--gold);border-radius:50%;flex-shrink:0}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);z-index:500;display:flex;align-items:center;justify-content:center}
.modal-box{background:var(--card2);border:1px solid var(--border);border-radius:24px;padding:30px;width:560px;max-width:95vw;max-height:90vh;overflow-y:auto}
.modal-title{font-size:18px;font-weight:800;margin-bottom:18px}

/* ── PHONE LIST ── */
.phone-list-box{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:14px;font-size:12px;font-family:'Space Mono',monospace;line-height:1.9;color:var(--text2);max-height:120px;overflow-y:auto;word-break:break-all;}

/* ── DIVIDER ── */
.divider{height:1px;background:var(--border);margin:16px 0}

/* ── ATTENDANCE ── */
.att-btn{padding:5px 12px;border:1px solid var(--border);border-radius:60px;font-size:11px;font-weight:700;cursor:pointer;background:var(--bg);color:var(--text2);transition:.15s;font-family:inherit}
.att-btn:hover{border-color:var(--gold);color:var(--gold)}
.att-btn.sel-P{background:rgba(34,197,94,.18);border-color:var(--green);color:var(--green)}
.att-btn.sel-A{background:rgba(231,111,81,.18);border-color:var(--coral);color:var(--coral)}
.att-btn.sel-L{background:rgba(212,175,55,.18);border-color:var(--gold);color:var(--gold)}

/* ── TIMETABLE ── */
.tt-grid{display:grid;grid-template-columns:90px repeat(5,1fr);gap:3px;font-size:12px}
.tt-head{background:var(--bg3);padding:8px;text-align:center;font-weight:700;color:var(--text2);border-radius:8px;font-size:11px;text-transform:uppercase}
.tt-time{background:var(--bg3);padding:8px;text-align:center;font-weight:600;color:var(--text3);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px}
.tt-cell{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:8px;min-height:58px;cursor:pointer;transition:.18s;position:relative}
.tt-cell:hover{border-color:var(--gold)}
.tt-cell.filled{background:rgba(212,175,55,.07);border-color:rgba(212,175,55,.25)}
.tt-cell .subj{font-weight:700;color:var(--gold);font-size:12px}
.tt-cell .teach{font-size:10px;color:var(--text2);margin-top:2px}

/* ── REPORT ── */
.report-box{border:2px solid var(--gold);border-radius:20px;padding:28px;background:var(--bg)}

/* ── BAR CHART ── */
.bar-wrap{display:flex;align-items:center;gap:10px;margin:5px 0}
.bar-label{font-size:11px;color:var(--text2);width:120px;flex-shrink:0;text-align:right}
.bar-track{flex:1;height:7px;background:var(--bg3);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;background:var(--gold);transition:width .6s ease}
.bar-val{font-size:11px;font-weight:700;width:40px;font-family:'Space Mono',monospace;color:var(--gold)}

@media(max-width:700px){.sidebar{display:none}.stats-grid{grid-template-columns:1fr 1fr}.form-grid{grid-template-columns:1fr}}
@media print{.sidebar,.topbar,.btn,.tab-row,.nav-item,.page-desc{display:none!important}body,html{background:#fff;color:#000}.card{border:1px solid #ccc;background:#fff}.main{padding:0}}
</style>
</head>
<body>

<!-- LOADING OVERLAY -->
<div id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text">Connecting to database…</div>
</div>

<!-- LOGIN -->
<div id="loginPage" class="hidden">
  <div class="login-box">
    <div class="login-logo">🎓</div>
    <div class="login-title">Mursagamba Secondary School</div>
    <div class="login-sub">School Management System &nbsp;|&nbsp; Mfumo wa Usimamizi</div>
    <div id="loginAlert" style="margin-bottom:10px"></div>
    <div class="form-group" style="margin-bottom:12px">
      <label>Username / Admission No.</label>
      <input id="username" placeholder="e.g. admin or MSS-001">
    </div>
    <div class="form-group" style="margin-bottom:20px">
      <label>Password / Nenosiri</label>
      <input id="password" type="password" placeholder="••••••••">
    </div>
    <button class="btn btn-gold" style="width:100%;justify-content:center;padding:12px" onclick="login()">
      <i class="fas fa-sign-in-alt"></i> Sign In / Ingia
    </button>
    <div class="login-hint">
      <strong>Demo Credentials:</strong><br>
      Admin / Head Teacher: <code>admin</code> / <code>1234</code><br>
      Teachers: username + password (set by admin)<br>
      Students: Admission No. + Phone number
    </div>
  </div>
</div>

<!-- APP -->
<div id="appWrap" class="hidden">
  <div class="topbar">
    <div class="brand">
      <div class="brand-icon">🎓</div>
      <div>
        <div class="brand-name">Murusagamba Secondary School</div>
        <div class="brand-sub">School Management System</div>
      </div>

async function dbGet(table, filters={}) {
  let q = sb.from(table).select('*');
  for (const [k,v] of Object.entries(filters)) q = q.eq(k, v);
  const { data, error } = await q.order('created_at', { ascending: true });
  if (error) { console.error(`dbGet ${table}`, error); return []; }
  return data || [];
}
async function dbInsert(table, row) {
  const { data, error } = await sb.from(table).insert(row).select().single();
  if (error) throw error;
  return data;
}
async function dbUpdate(table, id, fields) {
  const { data, error } = await sb.from(table).update(fields).eq('id', id).select().single();
  if (error) throw error;
  return data;
}
async function dbDelete(table, id) {
  const { error } = await sb.from(table).delete().eq('id', id);
  if (error) throw error;
}
async function dbDeleteWhere(table, filters={}) {
  let q = sb.from(table).delete();
  for (const [k,v] of Object.entries(filters)) q = q.eq(k, v);
  const { error } = await q;
  if (error) throw error;
}

/* In-memory cache to reduce repeated fetches */
const cache = {};
async function cached(key, fn) {
  if (cache[key]) return cache[key];
  cache[key] = await fn();
  return cache[key];
}
function clearCache(...keys) { keys.forEach(k => delete cache[k]); }
function clearAllCache() { Object.keys(cache).forEach(k => delete cache[k]); }

async function editStudent(id){
  const rows=await dbGet("students",{id}); const s=rows[0]; if(!s) return;
  const classes=await getAllClasses();
  const modal=document.createElement("div"); modal.className="modal-overlay";
  modal.innerHTML=`<div class="modal-box">

      <div id="es_newcls_wrap" class="form-group hidden"><label>New Class Name</label><input id="es_newcls" placeholder="e.g. Form 5A"></div>

      <div class="form-group"><label>Parent Name</label><input id="es_parent" value="${s.parent||""}"></div>

async function saveEditStudent(id){
  let cls=document.getElementById("es_class").value;
  if(cls==="__new__") cls=document.getElementById("es_newcls").value.trim();
  showLoading("Saving…");
  try {
    await dbUpdate("students",id,{ name:document.getElementById("es_name").value.trim(), class:cls, phone:document.getElementById("es_phone").value.trim(), parent:document.getElementById("es_parent").value.trim(), parent_phone:document.getElementById("es_parentphone").value.trim(), dob:document.getElementById("es_dob").value||null, gender:document.getElementById("es_gender").value });
    clearAllCache();
    document.querySelector(".modal-overlay")?.remove();
    flash("Student record updated!"); loadStudentGroups();
  } catch(e){ flash("Error: "+e.message,"danger"); }
  finally { hideLoading(); }
}

async function deleteStudent(id){
  if(!confirm("Remove this student and all their records?")) return;
  showLoading("Removing…");
  try {
    await dbDelete("students",id); // CASCADE deletes results, fees, attendance
    clearAllCache();
    loadStudentGroups(); flash("Student removed.");
  } catch(e){ flash("Error: "+e.message,"danger"); }
  finally { hideLoading(); }
}

function onStaffRoleChange(){

async function onResClassChange(){
  const cls=document.getElementById("resClass")?.value;
  const isAdmin=(CU.access_level||CU.role)==="admin";
  const stuSel=document.getElementById("resStudent"); const subjSel=document.getElementById("resSubject");
  if(!stuSel||!subjSel) return;
  const stuList=cls?(window._resStudents||[]).filter(s=>s.class===cls):(window._resStudents||[]);
  stuSel.innerHTML=stuList.length?stuList.map(s=>`<option value="${s.id}">${s.name}</option>`).join(""):`<option value="">No students</option>`;
  let subjs=window._resSubjects||[];
  if(cls&&!isAdmin){ const scope=await getMyScope(); if(scope!=="all") subjs=scope.filter(a=>a.class_name===cls).map(a=>a.subject); }
  subjSel.innerHTML=subjs.length?subjs.map(s=>`<option>${s}</option>`).join(""):`<option value="">No subjects</option>`;
}

async function saveResult(){
  const studentId=document.getElementById("resStudent")?.value;
  const subject=document.getElementById("resSubject")?.value;
  const exam=document.getElementById("resExam")?.value.trim();
  const marks=Number(document.getElementById("resMarks")?.value);
  if(!studentId||!subject||!exam||isNaN(marks)||marks<0||marks>100){ flash("Fill all fields correctly.","danger"); return; }
  const isAdmin=(CU.access_level||CU.role)==="admin";
  if(!isAdmin&&!(await canEnterResult(studentId,subject))){ flash("❌ You are not assigned to this class/subject.","danger"); return; }
  showLoading("Saving result…");
  try {
    await dbInsert("results",{student_id:studentId,subject,marks,grade:grade(marks),exam,entered_by:CU.name});
    clearAllCache();
    flash("Result saved!"); document.getElementById("resMarks").value="";
    // Refresh results list
    window._resResults=await dbGet("results");
    loadResultTable();
  } catch(e){ flash("Error: "+e.message,"danger"); }
  finally { hideLoading(); }
}

function loadResultTable(){
  const isAdmin=(CU.access_level||CU.role)==="admin";
  const allStudents=window._resStudents||[];
  const assigns=window._resAssigns||[];
  const filterExam=document.getElementById("filterExam")?.value||"";
  const filterClass=document.getElementById("filterClass")?.value||"";
  let data=window._resResults||[];
  if(!isAdmin) data=data.filter(r=>{ const stu=allStudents.find(s=>s.id==r.student_id); if(!stu) return false; return assigns.some(a=>a.class_name===stu.class&&a.subject===r.subject); });
  if(filterExam) data=data.filter(r=>r.exam===filterExam);
  if(filterClass) data=data.filter(r=>{ const s=allStudents.find(x=>x.id==r.student_id); return s&&s.class===filterClass; });
  let html=`<tr><th>Student</th><th>Class</th><th>Subject</th><th>Exam</th><th>Marks</th><th>Grade</th><th>Entered By</th></tr>`;
  data.slice().reverse().forEach(r=>{ const s=allStudents.find(x=>x.id==r.student_id); html+=`<tr><td><strong>${s?s.name:"?"}</strong></td><td>${s?`<span class="class-pill">${s.class}</span>`:"-"}</td><td>${r.subject}</td><td>${r.exam}</td><td>${r.marks}/100</td><td>${gradeBadge(r.grade)}</td><td style="color:var(--text2);font-size:12px">${r.entered_by||"-"}</td></tr>`; });
  const el=document.getElementById("resTable"); if(el) el.innerHTML=html;
}

async function loadAttList(){
  const cls=document.getElementById("attClass").value; if(!cls) return;
  const students=(await dbGet("students")).filter(s=>s.class===cls);
  attStatus={}; students.forEach(s=>attStatus[s.id]="P");
  let html=`<table><tr><th>Student</th><th>Mark</th></tr>`;
  students.forEach(s=>{ html+=`<tr><td>${s.name}</td><td><div style="display:flex;gap:5px">${["P","A","L"].map(st=>`<button class="att-btn${st==="P"?" sel-P":""}" id="ab-${s.id}-${st}" onclick="setAtt('${s.id}','${st}')">${st==="P"?"Present":st==="A"?"Absent":"Late"}</button>`).join("")}</div></td></tr>`; });
  document.getElementById("attList").innerHTML=html+"</table>";
}

function setAtt(id,status){ attStatus[id]=status; ["P","A","L"].forEach(st=>{ const b=document.getElementById(`ab-${id}-${st}`); if(b) b.className=`att-btn${status===st?" sel-"+st:""}` }); }

async function saveAttendance(){
  const cls=document.getElementById("attClass").value;
  const date=document.getElementById("attDate").value;
  if(!cls||!date){ flash("Select class and date.","danger"); return; }
  showLoading("Saving attendance…");
  try {
    const students=(await dbGet("students")).filter(s=>s.class===cls);
    // Delete existing records for this class+date then re-insert
    const { error:delErr } = await sb.from("attendance").delete().eq("date",date).eq("class",cls);
    if(delErr) throw delErr;
    const rows=students.map(s=>({student_id:s.id,date,status:attStatus[s.id]||"P",class:cls}));
    if(rows.length){ const { error } = await sb.from("attendance").insert(rows); if(error) throw error; }
    clearAllCache(); flash(`Attendance saved for ${cls} on ${date}.`); loadAttView();
  } catch(e){ flash("Error: "+e.message,"danger"); }
  finally { hideLoading(); }
}

async function loadAttView(){
  const date=document.getElementById("attViewDate")?.value||"";
  const cls=document.getElementById("attViewClass")?.value||"";
  let q=sb.from("attendance").select("*").order("created_at",{ascending:false}).limit(80);
  if(date) q=q.eq("date",date);
  if(cls) q=q.eq("class",cls);
  const { data:att } = await q;
  const students=await dbGet("students");
  let html=`<tr><th>Student</th><th>Class</th><th>Date</th><th>Status</th></tr>`;
  (att||[]).forEach(a=>{ const s=students.find(x=>x.id==a.student_id); const b=a.status==="P"?'<span class="badge badge-present">Present</span>':a.status==="A"?'<span class="badge badge-absent">Absent</span>':'<span class="badge badge-late">Late</span>'; html+=`<tr><td>${s?.name||"?"}</td><td>${s?.class||"-"}</td><td>${a.date}</td><td>${b}</td></tr>`; });
  const el=document.getElementById("attViewTable"); if(el) el.innerHTML=html;
}

  let html=`<div class="card"><div class="tt-grid"><div class="tt-head">Time</div>`;
  DAYS.forEach(d=>html+=`<div class="tt-head">${d}</div>`);
  PERIODS.forEach(p=>{

    DAYS.forEach(d=>{ const key=`${cls}||${d}||${p}`; const entry=_ttData.find(x=>x.key===key); html+=entry?`<div class="tt-cell filled" onclick="openTTModal('${key}')"><div class="subj">${entry.subject}</div><div class="teach">${entry.teacher}</div></div>`:`<div class="tt-cell" onclick="openTTModal('${key}')"><div style="color:var(--text3);font-size:11px">+ Add</div></div>`; });

async function saveTTCell(){

async function getPhonesForRecipient(recip){
  const staff=await dbGet("staff"), students=await dbGet("students");
  const teacherPhones=staff.filter(s=>s.access_level==="academic"&&s.phone).map(s=>({name:s.name,phone:s.phone}));
  const parentPhones=students.filter(s=>s.parent_phone).map(s=>({name:s.parent||"Parent",phone:s.parent_phone}));
  if(recip==="teachers") return teacherPhones;
  if(recip==="parents") return parentPhones;
  if(recip&&recip.startsWith("class:")){ const cls=recip.replace("class:",""); return students.filter(s=>s.class===cls&&s.parent_phone).map(s=>({name:s.parent||"Parent",phone:s.parent_phone})); }
  return [...teacherPhones,...parentPhones];
}

async function updatePhonePreview(){
  const recip=document.getElementById("annRecip")?.value||"all";
  const list=await getPhonesForRecipient(recip);
  const el=document.getElementById("phonePreview"); if(!el) return;
  if(!list.length){ el.textContent="No phone numbers found for this group."; return; }
  el.innerHTML=list.map(p=>`<span title="${p.name}">${p.phone}</span>`).join(", ");
  el.setAttribute("data-numbers",list.map(p=>p.phone).join(", "));
}

function copyPhones(){
  const el=document.getElementById("phonePreview"); const numbers=el?.getAttribute("data-numbers")||"";
  if(!numbers){ flash("No numbers to copy.","danger"); return; }
  navigator.clipboard.writeText(numbers).then(()=>{ const fb=document.getElementById("copyFeedback"); if(fb){ fb.textContent="✓ Copied!"; setTimeout(()=>fb.textContent="",2500); } }).catch(()=>flash("Failed to copy.","danger"));
}

async function sendAnnouncement(){
  const title=document.getElementById("annTitle")?.value.trim();
  const msg=document.getElementById("annMsg")?.value.trim();
  const recip=document.getElementById("annRecip")?.value||"all";
  const priority=document.getElementById("annPriority")?.value||"normal";
  if(!title||!msg){ flash("Title and message are required.","danger"); return; }
  showLoading("Sending…");
  try {
    const phoneObjs=await getPhonesForRecipient(recip);
    const ann=await dbInsert("announcements",{ title, message:msg, sent_to:recip, priority, sender:CU.name, sender_role:CU.role_title||"Admin", phone_numbers:phoneObjs.map(p=>p.phone), read_by:[] });
    await deliverToInbox(ann);
    clearAllCache();
    flash(`📢 Sent! ${phoneObjs.length} phone number${phoneObjs.length!==1?"s":""} ready.`);
    document.getElementById("annTitle").value=""; document.getElementById("annMsg").value="";
    renderAnnList("all");
  } catch(e){ flash("Error: "+e.message,"danger"); }
  finally { hideLoading(); }
}

async function deliverToInbox(ann){
  const staff=await dbGet("staff"), students=await dbGet("students");
  const recip=ann.sent_to;
  const rows=[];
  const makeMsg=(recipient_id,recipient_type)=>({ ann_id:ann.id, recipient_id, recipient_type, title:ann.title, message:ann.message, priority:ann.priority, sender:ann.sender, sender_role:ann.sender_role, read:false });
  if(recip==="all"||recip==="teachers") staff.filter(s=>s.access_level==="academic"||s.access_level==="bursar").forEach(s=>rows.push(makeMsg(s.id,"staff")));
  if(recip==="all"||recip==="parents") students.forEach(s=>rows.push(makeMsg(s.id,"student")));
  if(recip&&recip.startsWith("class:")){ const cls=recip.replace("class:",""); students.filter(s=>s.class===cls).forEach(s=>rows.push(makeMsg(s.id,"student"))); }
  if(rows.length){ await sb.from("inbox").insert(rows); }
}

async function filterSRes(){
  const me=CU.data; const exam=document.getElementById("sExamFilter")?.value||"";
  const results=(window._sResults||[]).filter(r=>!exam||r.exam===exam);
  let html=`<tr><th>Subject</th><th>Exam</th><th>Marks</th><th>Grade</th><th>Remarks</th></tr>`;
  results.forEach(r=>{ const rem=r.marks>=75?"Excellent":r.marks>=60?"Good":r.marks>=50?"Satisfactory":r.marks>=40?"Fair":"Needs Improvement"; html+=`<tr><td>${r.subject}</td><td>${r.exam}</td><td><strong>${r.marks}/100</strong></td><td>${gradeBadge(r.grade)}</td><td style="color:var(--text2)">${rem}</td></tr>`; });
  const el=document.getElementById("sResTable"); if(el) el.innerHTML=html;
  if(exam){
    const rank=await computeRank(me,exam);
    const total=results.reduce((a,b)=>a+b.marks,0);
    const avg=results.length?(total/results.length).toFixed(1):0;
    const ri=document.getElementById("sRankInfo");
    if(ri) ri.innerHTML=`<div class="stats-grid" style="max-width:460px"><div class="stat-card stat-blue"><div class="stat-val">${rank.pos}</div><div class="stat-label">Class Position</div></div><div class="stat-card stat-gold"><div class="stat-val">${total}</div><div class="stat-label">Total Marks</div></div><div class="stat-card stat-green"><div class="stat-val">${avg}%</div><div class="stat-label">Average</div></div></div>`;
  } else { const ri=document.getElementById("sRankInfo"); if(ri) ri.innerHTML=""; }
}

async function computeRank(me,exam){
  const { data:classStudents } = await sb.from("students").select("id").eq("class",me.class);
  const ids=classStudents.map(s=>s.id);
  const { data:allRes } = await sb.from("results").select("student_id,marks").eq("exam",exam).in("student_id",ids);
  const totals={};
  ids.forEach(id=>{ totals[id]=(allRes||[]).filter(r=>r.student_id===id).reduce((a,b)=>a+b.marks,0); });
  const sorted=Object.entries(totals).sort((a,b)=>b[1]-a[1]);
  return {pos:sorted.findIndex(x=>x[0]==me.id)+1||"-"};
}

        <div><span style="color:var(--text2)">Exam: </span><strong>${exam}</strong></div>
        <div><span style="color:var(--text2)">Total: </span><strong>${total}</strong></div>
        <div><span style="color:var(--text2)">Average: </span><strong>${avg}%</strong></div>
        <div><span style="color:var(--text2)">Position: </span><strong>${rank.pos}</strong></div>
        <div><span style="color:var(--text2)">Grade: </span>${gradeBadge(overall)}</div>
      </div>
      <table><tr><th>#</th><th>Subject</th><th>Marks</th><th>Grade</th><th>Remarks</th></tr>
        ${results.map((r,i)=>`<tr><td>${i+1}</td><td>${r.subject}</td><td>${r.marks}/100</td><td>${gradeBadge(r.grade)}</td><td>${r.marks>=75?"Excellent":r.marks>=60?"Good":r.marks>=50?"Satisfactory":r.marks>=40?"Fair":"Needs Improvement"}</td></tr>`).join("")}
      </table>
      <div style="margin-top:20px;display:flex;justify-content:space-between;align-items:center">
        <div style="font-size:11px;color:var(--text3)">Generated: ${new Date().toLocaleDateString()}</div>
        <button class="btn btn-ghost" onclick="window.print()">🖨 Print Report Card</button>
      </div>
    </div>`;
}

async function renderStudentFees(){
  const mc=document.getElementById("mainContent");
  showLoading("Loading fees…");
  const me=CU.data;
  const fees=await dbGet("fees",{student_id:me.id});
  hideLoading();
  const paid=fees.reduce((a,b)=>a+Number(b.amount),0);
  const due=fees.reduce((a,b)=>a+Number(b.total_due||0),0);
  const balance=due-paid;
  mc.innerHTML=`
    ${ph("My Fees","Your fee payment records")}
    <div class="stats-grid" style="max-width:500px">
      <div class="stat-card stat-green"><div class="stat-val">${fmtMoney(paid)}</div><div class="stat-label">Total Paid</div></div>
      <div class="stat-card ${balance>0?"stat-coral":"stat-green"}"><div class="stat-val">${fmtMoney(Math.abs(balance))}</div><div class="stat-label">${balance>0?"Balance Due":"All Cleared"}</div></div>
    </div>
    <div class="card"><div class="card-title">Payment History</div>
      <table><tr><th>Term</th><th>Paid</th><th>Due</th><th>Method</th><th>Date</th><th>Status</th></tr>
        ${fees.map(f=>{ const pct=f.total_due?f.amount/f.total_due:1; const s=pct>=1?'<span class="badge badge-paid">Paid</span>':pct>0?'<span class="badge badge-partial">Partial</span>':'<span class="badge badge-unpaid">Unpaid</span>'; return`<tr><td>${f.term||"-"}</td><td style="color:var(--green)">${fmtMoney(f.amount)}</td><td>${f.total_due?fmtMoney(f.total_due):"-"}</td><td>${f.method||"-"}</td><td>${f.date||"-"}</td><td>${s}</td></tr>`; }).join("")||"<tr><td colspan='6' style='color:var(--text3)'>No records found</td></tr>"}
      </table>
    </div>`;
}

/* ════════════════════════════════════════
   BOOT — check DB connectivity then show login
════════════════════════════════════════ */
async function boot(){
  try {
    // Quick connectivity check
    await sb.from("staff").select("id").limit(1);
    hideLoading();
    document.getElementById("loginPage").classList.remove("hidden");
  } catch(e){
    document.querySelector("#loadingOverlay .loading-text").textContent="⚠ Cannot connect to database. Check your network.";
  }
}

document.addEventListener("keydown",e=>{ if(e.key==="Enter"&&!document.getElementById("loginPage").classList.contains("hidden")) login(); });
boot();
</script>
